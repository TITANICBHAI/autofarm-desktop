name: Build native installers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Install Playwright browsers
        run: ./gradlew app-ui:run --args="install-playwright" || true
        continue-on-error: true

      - name: Build MSI installer
        run: ./gradlew app-ui:packageMsi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: AutoFarm-Windows
          path: app-ui/build/compose/binaries/main/msi/*.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxtst-dev libxrandr-dev fakeroot rpm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Build DEB installer
        run: ./gradlew :app-ui:packageDeb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: AutoFarm-Linux
          path: app-ui/build/compose/binaries/main/deb/*.deb
